name: 📜 정책 변경
description: 이용약관, 개인정보처리방침 등 정책 변경
title: "[Policy]: "
labels: ["state:triage", "area:legal"]
body:
  - type: textarea
    id: reason
    attributes:
      label: 변경 사유
      description: 왜 이 정책을 변경해야 하는지
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 영향 범위
      description: 어떤 부분에 영향을 미치는지
      placeholder: |
        - 영향 받는 사용자:
        - 영향 받는 기능:
    validations:
      required: true

  - type: dropdown
    id: legal-review
    attributes:
      label: 법무 검토 필요
      options:
        - "예"
        - "아니오"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - p0 (긴급)
        - p1 (중요)
        - p2 (일반)
    validations:
      required: true
