name: 🚀 새 기능
description: 새로운 기능 요청
title: "[Feature]: "
labels: ["state:triage", "needs:input"]
body:
  - type: input
    id: title
    attributes:
      label: 기능 제목
      description: 추가하려는 기능의 이름
      placeholder: "예: 회원가입 기능"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 무엇을 해야 하는지 설명해 주세요
      placeholder: 기능에 대한 상세 설명
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 수용 기준 (Acceptance Criteria)
      description: 기능이 완료되었다고 판단할 기준
      placeholder: |
        - [ ] 조건 1
        - [ ] 조건 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - p0 (긴급)
        - p1 (중요)
        - p2 (일반)
    validations:
      required: true

  - type: dropdown
    id: start-team
    attributes:
      label: 시작 팀
      options:
        - 기획팀
        - 개발팀
        - 법무팀
        - 마케팅팀
    validations:
      required: true
