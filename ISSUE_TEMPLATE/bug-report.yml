name: 🐛 버그 리포트
description: 버그 신고
title: "[Bug]: "
labels: ["state:triage", "area:dev"]
body:
  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 버그를 재현하는 방법
      placeholder: |
        1. '...'로 이동
        2. '...'를 클릭
        3. '...'까지 스크롤
        4. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
      description: 어떻게 작동해야 하는지
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떻게 작동하는지
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 환경
      description: 브라우저, OS 등
      placeholder: "Chrome 120, macOS 14.2"

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - p0 (긴급)
        - p1 (중요)
        - p2 (일반)
    validations:
      required: true
